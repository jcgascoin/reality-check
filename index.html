<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reality Check — Plan de Vol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap');
        
        :root {
            --bg: #f8faff;
            --card: #ffffff;
            --text: #1a1440;
            --muted: #7b6fa0;
            --accent: #6c47ff;
            --border: rgba(108,71,255,0.1);
            --won: #10b981;
            --orange: #f59e0b;
            --red: #ef4444;
        }

        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 1000px; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 40px; 
        }

        header h1 { 
            font-size: 32px; 
            margin: 0; 
            background: linear-gradient(135deg, #6c47ff, #f472b6, #f59e0b); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -1px; 
        }

        .export-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(108, 71, 255, 0.3);
        }

        .section-label { font-size: 14px; font-weight: 700; color: var(--text); margin: 30px 0 15px 5px; display: block; }

        .top-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .input-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .input-card label { display: block; font-size: 10px; color: var(--muted); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .input-card input { width: 100%; border: none; font-family: 'DM Mono'; font-size: 18px; outline: none; color: var(--text); font-weight: 600; background: transparent; }

        .pipe-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .pipe-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 15px; position: relative; }
        
        .status-dot { position: absolute; top: 15px; right: 15px; width: 8px; height: 8px; border-radius: 50%; }
        .dot-green { background: var(--won); box-shadow: 0 0 12px var(--won); }
        .dot-orange { background: var(--orange); box-shadow: 0 0 12px var(--orange); }
        .dot-red { background: var(--red); box-shadow: 0 0 12px var(--red); }

        .pipe-card label { font-size: 11px; font-weight: 800; color: var(--muted); display: block; margin-bottom: 10px; }
        .pipe-card input { width: 100%; border: none; border-bottom: 1px solid #f0f0f0; font-family: 'DM Mono'; font-size: 14px; outline: none; padding-bottom: 4px; color: var(--text); background: transparent; }

        .rates-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .rate-pill { background: #eeebff; border-radius: 10px; padding: 10px; text-align: center; font-size: 12px; color: var(--accent); font-weight: 700; border: 1px solid rgba(108,71,255,0.1); }
        .rate-pill input { background: transparent; border: none; font-family: 'DM Mono'; width: 40px; text-align: center; color: var(--accent); font-weight: 800; outline: none; font-size: 14px; }

        .tunnel-container { background: #fff; border-radius: 24px; padding: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-top: 30px; width: 100%; overflow: hidden; }
        svg { width: 100%; height: auto; display: block; }

        .analysis-engine { 
            background: #1a1440; color: #fff; border-radius: 24px; padding: 35px; margin-top: 30px; 
            display: flex; flex-wrap: wrap; gap: 40px; align-items: center; width: 100%;
        }
        .engine-display { text-align: center; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 30px; min-width: 180px; }
        .engine-display .number { font-size: 64px; font-weight: 700; color: var(--orange); line-height: 1; }
        .engine-display .label { font-size: 11px; color: #a5a1ff; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 12px; font-weight: 700; }
        .engine-text { flex: 1; min-width: 300px; font-size: 16px; line-height: 1.7; color: #e0dfff; }
        .tip { font-size: 13px; color: #a5a1ff; margin-top: 15px; font-style: italic; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }

        @media (max-width: 600px) {
            .engine-display { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 0 20px 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>The Reality Check</h1>
        <button onclick="window.print()" class="export-btn">💾 Exporter</button>
    </header>

    <div class="top-grid">
        <div class="input-card"><label>Propriétaire</label><input type="text" id="user-name" value="Ton nom"></div>
        <div class="input-card"><label>Objectif Cible (€)</label><input type="number" id="obj" value="250000"></div>
        <div class="input-card"><label>Won à date (€)</label><input type="number" id="won-at-date" value="60000"></div>
        <div class="input-card"><label>Panier Moyen (€)</label><input type="number" id="aov" value="20000"></div>
    </div>

    <label class="section-label">État actuel du Pipeline :</label>
    <div class="pipe-grid" id="pipe-inputs"></div>

    <label class="section-label">Taux de conversion (%) :</label>
    <div class="rates-row" id="rates-inputs"></div>

    <div class="tunnel-container">
        <svg id="svg-tunnel" viewBox="0 0 800 480"></svg>
    </div>

    <div class="analysis-engine">
        <div class="engine-display">
            <div class="number" id="r0-gap">0</div>
            <div class="label">Nouveaux R0 requis</div>
        </div>
        <div id="engine-msg" class="engine-text">Analyse en cours...</div>
    </div>
</div>

<script>
    const stages = [
        { id: 'R0', name: 'R0', color: '#6c47ff', txt: '#fff' },
        { id: 'R1', name: 'R1', color: '#a855f7', txt: '#fff' },
        { id: 'R2', name: 'R2', color: '#f472b6', txt: '#fff' },
        { id: 'R3', name: 'R3', color: '#f59e0b', txt: '#1a1440' },
        { id: 'R4', name: 'R4', color: '#3b82f6', txt: '#fff' }
    ];

    const defaultVols = [25, 15, 10, 6, 4];
    const defaultVals = [500000, 300000, 200000, 120000, 80000];
    const teamRates = [70, 65, 60, 55, 50];

    function init() {
        const pipeGrid = document.getElementById('pipe-inputs');
        const ratesRow = document.getElementById('rates-inputs');
        
        pipeGrid.innerHTML = '';
        ratesRow.innerHTML = '';

        stages.forEach((s, i) => {
            pipeGrid.innerHTML += `
                <div class="pipe-card">
                    <div class="status-dot" id="dot-${i}"></div>
                    <label>${s.name}</label>
                    <input type="number" id="vol-${i}" value="${defaultVols[i]}" class="trigger">
                    <input type="number" id="val-${i}" value="${defaultVals[i]}" class="trigger">
                </div>`;
        });

        teamRates.forEach((r, i) => {
            ratesRow.innerHTML += `<div class="rate-pill">R${i}>${i < 4 ? 'R'+(i+1) : 'WON'} <input type="number" id="r-${i}" value="${r}" class="trigger">%</div>`;
        });

        document.querySelectorAll('.trigger, input').forEach(el => {
            el.addEventListener('input', calculate);
        });

        calculate();
    }

    function calculate() {
        const obj = parseFloat(document.getElementById('obj').value) || 0;
        const wonAtDate = parseFloat(document.getElementById('won-at-date').value) || 0;
        const aov = parseFloat(document.getElementById('aov').value) || 1;
        
        const vals = stages.map((_, i) => parseFloat(document.getElementById(`val-${i}`).value) || 0);
        const vols = stages.map((_, i) => parseFloat(document.getElementById(`vol-${i}`).value) || 0);
        const rates = teamRates.map((_, i) => (parseFloat(document.getElementById(`r-${i}`).value) || 0) / 100);

        let probToWon = [0,0,0,0,0];
        probToWon[4] = rates[4];
        probToWon[3] = rates[3] * rates[4];
        probToWon[2] = rates[2] * rates[3] * rates[4];
        probToWon[1] = rates[1] * rates[2] * rates[3] * rates[4];
        probToWon[0] = rates[0] * rates[1] * rates[2] * rates[3] * rates[4];

        const projectedPipe = vals.reduce((acc, v, i) => acc + (v * probToWon[i]), 0);
        const gap = Math.max(0, obj - (wonAtDate + projectedPipe));
        const neededR0 = Math.ceil(gap / (aov * probToWon[0]));

        const svg = document.getElementById('svg-tunnel');
        const W = 800; const slotH = 80; const gSvg = 8;
        let draw = `<rect width="800" height="480" fill="#ffffff" rx="20"/>`;

        stages.forEach((s, i) => {
            const y = 20 + i * (slotH + gSvg);
            const wT = 660 - (660 - 320) * (i / 5);
            const wB = 660 - (660 - 320) * ((i+1) / 5);
            const xT = (W - wT) / 2; const xB = (W - wB) / 2;
            
            draw += `<polygon points="${xT},${y} ${xT+wT},${y} ${xB+wB},${y+slotH} ${xB},${y+slotH}" fill="${s.color}" />`;
            const contrib = Math.round(vals[i] * probToWon[i]);
            draw += `<text x="${W/2}" y="${y + 35}" text-anchor="middle" font-size="12" fill="${s.txt}">${vols[i]} deals en ${s.id}</text>
                     <text x="${W/2}" y="${y + 55}" text-anchor="middle" font-size="14" font-weight="700" fill="${s.txt}">${contrib.toLocaleString()} € PROJETÉS</text>`;

            const dot = document.getElementById(`dot-${i}`);
            if (gap <= 0) dot.className = 'status-dot dot-green';
            else if (gap / obj > 0.2) dot.className = 'status-dot dot-red';
            else dot.className = 'status-dot dot-orange';
        });

        svg.innerHTML = draw;
        document.getElementById('r0-gap').innerText = isFinite(neededR0) ? neededR0 : 0;
        
        const msg = document.getElementById('engine-msg');
        if (gap > 0) {
            msg.innerHTML = `Objectif : <b>${obj.toLocaleString()} €</b>. Déjà signé : <b>${wonAtDate.toLocaleString()} €</b>.<br>Ton pipe actuel projette <b>${Math.round(projectedPipe).toLocaleString()} €</b>. Il te manque <b>${Math.round(gap).toLocaleString()} €</b> pour atteindre ta cible. Tu dois générer <b>${neededR0} nouveaux R0</b> ASAP.`;
        } else {
            msg.innerHTML = `<span style="color:#10b981; font-weight:bold;">TRAJECTOIRE SÉCURISÉE !</span><br>Tu es au-dessus de ton objectif avec ta projection actuelle. Reste focus sur l'exécution.`;
        }
    }

    window.onload = init;
</script>
</body>
</html>
