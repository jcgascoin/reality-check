<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Reality Check — Analyse de Pipe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: rgba(255,255,255,0.1);
    --text: #eeeef0; --muted: #7b7f99; --accent: #3b55e0; --green: #4a9a2a;
    --red: #e24b4a; --amber: #d4920a; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .container { width: 100%; max-width: 950px; }
  header { text-align: center; margin-bottom: 30px; }
  header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; background: linear-gradient(to right, #fff, var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .top-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
  .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
  .input-card label { display: block; font-size: 9px; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
  .input-card input { width: 100%; background: transparent; border: none; font-family: var(--mono); font-size: 14px; color: var(--text); outline: none; }
  .pipe-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 10px; }
  .pipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 15px 12px; position: relative; }
  .pipe-card input { width: 100%; background: transparent; border: none; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .status-dot { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; border-radius: 50%; }
  .rates-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
  .rate-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px; text-align: center; font-size: 11px; color: var(--amber); }
  .rate-card input { background: transparent; border: none; font-family: var(--mono); font-size: 11px; color: var(--amber); width: 30px; text-align: right; outline: none; }
  .legend-box { margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 8px; font-size: 11px; color: var(--muted); display: flex; justify-content: center; gap: 40px; border: 0.5px solid var(--border); }
  .legend-item b { color: var(--text); font-weight: 600; }
  .tunnel-wrap { margin-top: 30px; width: 100%; }
  .summary-line { margin: 40px auto 25px auto; width: 100%; max-width: 900px; border: 1px dashed var(--muted); border-radius: 8px; padding: 16px; text-align: center; font-size: 15px; }
  .summary-line.danger { border-color: var(--red); color: var(--red); }
  .summary-line.success { border-color: var(--green); color: #7ac94a; }
  .gap-box { border-radius: 16px; padding: 30px; text-align: center; background: var(--surface); border: 1px solid var(--border); }
  .gap-box.danger { border-top: 4px solid var(--red); }
  .gap-box.ok { border-top: 4px solid var(--green); }
  .action-title { font-size: 13px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
  .main-val { font-size: 26px; font-weight: 600; margin-bottom: 20px; }
  .action-text { font-size: 15px; color: var(--text); line-height: 1.6; max-width: 650px; margin: 0 auto; padding-top: 20px; border-top: 1px solid var(--border); }
  .highlight { color: #fff; font-weight: 700; background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>The Reality Check</h1>
    <p style="color: var(--muted); font-size: 13px; margin-top: 5px;">Quelle est la solidité de ton pipe ? Analyse et plan d'action.</p>
  </header>
  <div class="top-grid">
    <div class="input-card"><label>Propriétaire du pipe</label><input type="text" id="name" value="Guillaume" oninput="draw()"/></div>
    <div class="input-card"><label>Objectif (€ HT)</label><input type="number" id="obj" value="150000" oninput="draw()"/></div>
    <div class="input-card" style="border-color: var(--amber);"><label>Panier Moyen Cible (€)</label><input type="number" id="ref_aov" value="20000" oninput="draw()"/></div>
  </div>
  <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin: 25px 0 10px; font-weight: 600; letter-spacing: 0.05em;">État actuel des opportunités</div>
  <div class="pipe-grid">
    <div class="pipe-card"><div id="dot0" class="status-dot"></div><label style="font-size:10px; color:var(--muted)">R0</label><input type="number" id="n0" value="1
